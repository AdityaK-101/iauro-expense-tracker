<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container-fluid">
  <div class="row" style="height: 100vh;">

    <!-- Left side -->
    <div class="col-md-6 d-flex justify-content-center align-items-center">
      <div style="width: 300px;">
        <h2>Login</h2>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST">
          <input class="form-control mb-2" name="username" placeholder="Username" required>
          <input class="form-control mb-2" name="password" placeholder="Password" type="password" required>
          
          <button class="btn btn-primary w-100 mb-2">Login</button>
        </form>

        <a href="/signup" class="btn btn-outline-secondary w-100">Signup</a>
      </div>
    </div>

    <!-- Right side -->
    <div class="col-md-6 bg-light d-flex justify-content-center align-items-center">
      <h3>Expense Tracker</h3>
    </div>

  </div>
</div>
