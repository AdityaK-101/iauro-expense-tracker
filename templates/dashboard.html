<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<nav class="navbar navbar-light bg-light px-3">
  <span class="navbar-brand mb-0 h1">Expense Tracker</span>
  <a href="/logout" class="btn btn-danger">Logout</a>
</nav>

<div class="container mt-4">
<h3>Record expense</h3>

<form method="POST" class="row g-3">

  <!-- Left side (Category + Amount) -->
  <div class="col-md-6">
    <input class="form-control mb-2" name="category" list="categories" placeholder="Category" required>
    <input class="form-control" name="amount" type="number" placeholder="Amount" required>
  </div>
  <datalist id="categories">
  {% for c in categories %}
    <option value="{{ c }}">
  {% endfor %}
</datalist>

  <!-- Right side (Comments) -->
  <div class="col-md-6">
    <input class="form-control h-100" name="comments" placeholder="Comments">
  </div>

  <!-- Button -->
  <div class="col-12">
    <button class="btn btn-primary">Add Expense</button>
  </div>

</form>


<div class="row mt-3">

  <!-- LEFT: TABLE -->
  <div class="col-md-8">
    <table class="table">
      <tr>
        <th>Category</th>
        <th>Amount</th>
        <th>Comments</th>
        <th>Created At</th>
        <th>Updated At</th>
        <th>Edit</th>
        <th>Delete</th>
      </tr>

      {% for e in expenses %}
      <tr>
        <td>{{e[1]}}</td>
        <td>{{e[2]}}</td>
        <td>{{e[3]}}</td>
        <td>{{e[4]}}</td>
        <td>{{e[5]}}</td>
        <td><a class="btn btn-outline-primary btn-sm" href="/edit/{{e[0]}}">Edit</a></td>
        <td><a class="btn btn-outline-danger btn-sm" href="/delete/{{e[0]}}">Delete</a></td>
      </tr>
      {% endfor %}
    </table>
  </div>

  <!-- RIGHT: CHART -->
  <div class="col-md-4">
    <h3>Category Distribution</h3>

    <div style="width: 100%; height: 350px;">
      <canvas id="chart"></canvas>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
new Chart(document.getElementById("chart"), {
    type: 'pie',
    data: {
        labels: {{labels|tojson}},
        datasets: [{
            data: {{values|tojson}}
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
</script>
</div>
