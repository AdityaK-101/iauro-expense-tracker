<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container">
    <div class="col-md-4 mt-5">
        <h2>Edit Expense</h2>

        <form method="POST">
            <input class="form-control mb-2" name="category" value="{{e[1]}}" required>
            <input class="form-control mb-2" name="amount" type="number" value="{{e[2]}}" required>
            <input class="form-control mb-2" name="comments" value="{{e[3]}}">
            <button class="btn btn-success w-100">Update</button>
        </form>
    </div>
</div>
